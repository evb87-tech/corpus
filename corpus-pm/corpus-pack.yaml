    command: /pm-review-strategy
    agent: null
    target-types: []
  - name: user
    command: /pm-review-user
    agent: null
    target-types: []
  - name: feasibility
    command: /pm-review-feasibility
    agent: null
    target-types: []

beads-handoffs:
