name: corpus-pm
extends: corpus-core
core-version: "^0.1.0"

entity-types:
  - name: persona
    template: templates/persona.md
    sections: []
    extra-frontmatter: []
  - name: segment
    template: templates/segment.md
    sections: []
    extra-frontmatter: []
  - name: competitor
    template: templates/competitor.md
    sections: []
    extra-frontmatter: []
  - name: interview
    template: templates/interview.md
    sections: []
    extra-frontmatter: []
  - name: feature
    template: templates/feature.md
    sections: []
    extra-frontmatter: []
  - name: decision
    template: templates/decision.md
    sections: []
    extra-frontmatter: []

review-angles:
